{% extends "base.html" %}
{% block title %}Порты – {{ server.name }}{% endblock %}
{% block content %}
<h2>Управление портами</h2>
<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-2">
                <label class="form-label">Порт сервера</label>
                <input type="number" name="port" value="{{ port }}" class="form-control" min="1" max="65535">
            </div>
            <button type="submit" class="btn btn-primary">Изменить порт</button>
        </form>
        <p class="text-muted mt-2">После изменения порта необходимо перезапустить сервер.</p>
    </div>
</div>
<a href="{{ url_for('server_detail', server_id=server.id) }}" class="btn btn-secondary">Назад</a>
{% endblock %}
