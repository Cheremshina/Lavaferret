{% extends "base.html" %}
{% block title %}Редактирование файла – {{ server.name }}{% endblock %}
{% block content %}
<h2>Редактирование файла: {{ file_path }}</h2>
<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-2">
                <label class="form-label">Содержимое файла</label>
                <textarea name="content" class="form-control" rows="20" style="font-family: monospace;">{{ content }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('files', server_id=server.id, path='/'.join(file_path.split('/')[:-1]) if '/' in file_path else '') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
<a href="{{ url_for('files', server_id=server.id) }}" class="btn btn-secondary">← Назад к файлам</a>
{% endblock %}
